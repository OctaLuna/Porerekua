server {
    listen 80;
    server_name kaaiya.ucb.edu.bo;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kaaiya.ucb.edu.bo;

    ssl_certificate     /etc/letsencrypt/live/kaaiya.ucb.edu.bo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaaiya.ucb.edu.bo/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Frontend SPA (React + Vite) ──────────────────────────────────────────
    location / {
        root /var/www/kaaiya/frontend/dist;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # ── NestJS API backend ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Static file uploads (images) ─────────────────────────────────────────
    location /uploads/ {
        alias /var/www/kaaiya/api-rest-amazonia/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── PMTiles static tiles (Range Request support required by MapLibre) ─────
    location /tiles/ {
        alias /var/www/kaaiya/tiles/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
    }

    # ── GeoRef port 8001 is NOT proxied ──────────────────────────────────────
    # Port 8001 binds only to 127.0.0.1 (loopback) and is never exposed here.
    # Only the NestJS backend can call it internally.

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_min_length 1000;
}
